services:
  gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - security
      - uploader
      - minio
    networks:
      - microservices-net

  security:
    image: python:3.11-alpine
    container_name: security-service
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && python security_service.py"
    environment:
      - FLASK_APP=security_service.py
      - JWT_SECRET=your-secret-key
    volumes:
      - ./services/security:/app
    ports:
      - "8081:8081"
    networks:
      - microservices-net

  uploader:
    image: python:3.11-alpine
    container_name: uploader-service
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && python uploader_service.py"
    volumes:
      - ./services/uploader:/app
    depends_on:
      - minio
    networks:
      - microservices-net
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin

  minio:
    image: minio/minio
    container_name: minio-storage
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - microservices-net

networks:
  microservices-net:
    driver: bridge

volumes:
  minio-data:
